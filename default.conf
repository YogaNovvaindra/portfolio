# Map incoming X-Forwarded-Proto header, fallback to $scheme if empty
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen       80;
    server_name  localhost;

    root /app;  # Move root outside for consistency

    # Serve static JS files
    location /js/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }

    # Serve static CSS files
    location /css/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }

    # Serve favicon and other assets
    location /favicon.ico {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }

    # Serve other static images and media with aggressive caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|webp|avif)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=2592000";
        add_header Vary "Accept-Encoding";
    }

    # Reverse proxy for internal Ghost API
    location ^~ /ghost/api/ {
        proxy_pass http://ghost.services:2368/ghost/api/;
        proxy_set_header Host ygnv.my.id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # Reverse proxy for internal Ghost content (images, files, etc.)
    location ^~ /content/ {
        proxy_pass http://ghost.services:2368/content/;
        proxy_set_header Host ygnv.my.id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        add_header Vary "Accept-Encoding";
    }

    # Vue app with client-side routing fallback
    location / {
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Error page handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
