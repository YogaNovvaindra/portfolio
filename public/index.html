<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    
    <!-- Primary Meta Tags -->
    <title><%= htmlWebpackPlugin.options.title %></title>
    <meta name="title" content="Yoga Novaindra — DevSecOps Engineer">
    <meta name="description" content="Portfolio of Yoga Novaindra, a DevSecOps Engineer building automated, secure, and observable infrastructure — from bare-metal Kubernetes clusters to cloud-native platforms.">
    <meta name="keywords" content="Yoga Novaindra, DevSecOps, Platform Engineer, Kubernetes, Docker, Ansible, GitOps, Grafana, Wazuh, Cloud, Portfolio">
    <meta name="author" content="Yoga Novaindra">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yoganova.my.id/">
    <meta property="og:title" content="Yoga Novaindra — DevSecOps Engineer">
    <meta property="og:description" content="DevSecOps Engineer building automated, secure, and observable infrastructure — from bare-metal Kubernetes clusters to cloud-native platforms.">
    <meta property="og:image" content="https://yoganova.my.id/img/avatar.webp">
    <meta property="og:site_name" content="Yoga Novaindra">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://yoganova.my.id/">
    <meta name="twitter:title" content="Yoga Novaindra — DevSecOps Engineer">
    <meta name="twitter:description" content="DevSecOps Engineer building automated, secure, and observable infrastructure — from bare-metal Kubernetes clusters to cloud-native platforms.">
    <meta name="twitter:image" content="https://yoganova.my.id/img/avatar.webp">
    <meta name="twitter:creator" content="@yoganovaindra">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- <link rel="stylesheet" href="../assets/css/style.css"> -->
    
    <!-- Preload Critical Above-the-Fold Assets -->
    <link rel="preload" as="image" href="/img/avatar.webp" fetchpriority="high">
    <link rel="preload" as="image" href="/img/avatar2.webp" fetchpriority="high">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
