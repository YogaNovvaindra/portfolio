<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    
    <!-- Primary Meta Tags -->
    <title><%= htmlWebpackPlugin.options.title %></title>
    <meta name="title" content="Yoga Novaindra - Portfolio">
    <meta name="description" content="Portfolio of Yoga Novaindra, a platform engineer and developer building automated, secure, and observable infrastructure from bare-metal clusters to cloud-native platforms.">
    <meta name="keywords" content="Yoga Novaindra, Platform Engineer, DevOps, Kubernetes, Developer, Portfolio">
    <meta name="author" content="Yoga Novaindra">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yoganova.my.id/">
    <meta property="og:title" content="Yoga Novaindra - Portfolio">
    <meta property="og:description" content="Portfolio of Yoga Novaindra, building automated, secure, and observable infrastructure from bare-metal clusters to cloud-native platforms.">
    <meta property="og:image" content="https://yoganova.my.id/favicon.ico">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yoganova.my.id/">
    <meta property="twitter:title" content="Yoga Novaindra - Portfolio">
    <meta property="twitter:description" content="Portfolio of Yoga Novaindra, building automated, secure, and observable infrastructure from bare-metal clusters to cloud-native platforms.">
    <meta property="twitter:image" content="https://yoganova.my.id/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- <link rel="stylesheet" href="../assets/css/style.css"> -->
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
